name: Quality Checks
on:
  pull_request: {}
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate site
        run: npm run validate
